<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Banderas del Mundo">
  <!-- Campo: Amarillo de marca (#FFD935), esquinas chunky -->
  <rect width="512" height="512" rx="112" fill="#FFD935"/>

  <!-- Pegatina "ficha de bandera" (eco de FlagImage): tarjeta blanca con contorno
       de tinta y sombra dura desplazada, ladeada como sticker. Dentro, un globo
       terráqueo en tinta = "banderas del mundo". -->
  <g transform="rotate(-5 256 256)">
    <!-- Sombra dura (offset sin desenfoque) -->
    <rect x="146" y="172" width="248" height="196" rx="24" fill="#17150F"/>
    <!-- Tarjeta -->
    <rect x="132" y="158" width="248" height="196" rx="24" fill="#FFFDF8" stroke="#17150F" stroke-width="14"/>
    <!-- Globo: círculo + meridiano + ecuador -->
    <g fill="none" stroke="#17150F" stroke-width="12">
      <circle cx="256" cy="256" r="58"/>
      <ellipse cx="256" cy="256" rx="24" ry="58"/>
      <ellipse cx="256" cy="256" rx="58" ry="24"/>
    </g>
  </g>
</svg>
